<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Jogo da Forca</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --gb-bg: #9bbc0f;
            --gb-dark: #0f380f;
            --gb-mid: #306230;
            --gb-light: #8bac0f;
            --white: #f8f8e8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--gb-bg);
            font-family: 'Press Start 2P', monospace;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px 16px;
            image-rendering: pixelated;
        }

        h1 {
            font-size: 0.85rem;
            color: var(--gb-dark);
            letter-spacing: 2px;
            margin-bottom: 24px;
            text-align: center;
        }

        .screen {
            background: var(--white);
            border: 4px solid var(--gb-dark);
            box-shadow: 4px 4px 0 var(--gb-dark);
            padding: 20px;
            width: 100%;
            max-width: 640px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .vidas-label {
            font-size: 0.4rem;
            color: var(--gb-mid);
            margin-bottom: 4px;
        }

        #vidas {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }

        .coracao {
            font-size: 1.2rem;
            transition: filter 0.2s, transform 0.2s;
        }

        .coracao.perdido {
            filter: grayscale(1) opacity(0.3);
            transform: scale(0.8);
        }

        .segredo-label {
            font-size: 0.4rem;
            color: var(--gb-mid);
            margin-bottom: 6px;
        }

        #segredo {
            font-size: 1.6rem;
            letter-spacing: 12px;
            color: var(--gb-dark);
            text-align: center;
            min-height: 48px;
            word-break: break-all;
            padding: 10px 0;
            border-top: 2px solid var(--gb-dark);
            border-bottom: 2px solid var(--gb-dark);
        }

        .info-label {
            font-size: 0.4rem;
            color: var(--gb-mid);
            margin-bottom: 4px;
        }

        #letras-usadas {
            font-size: 0.55rem;
            color: var(--gb-mid);
            letter-spacing: 3px;
            min-height: 16px;
            word-break: break-all;
        }

        .lb-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .lb-box {
            border: 2px solid var(--gb-dark);
            padding: 10px;
        }

        .lb-title {
            font-size: 0.4rem;
            color: var(--gb-dark);
            margin-bottom: 8px;
            padding-bottom: 6px;
            border-bottom: 1px solid var(--gb-mid);
        }

        .lb-entry {
            font-size: 0.45rem;
            color: var(--gb-mid);
            padding: 3px 0;
            display: flex;
            justify-content: space-between;
        }

        .lb-entry.primeiro { color: var(--gb-dark); }

        #mensagem {
            font-size: 0.6rem;
            color: var(--gb-dark);
            text-align: center;
            min-height: 20px;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .input-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .input-label {
            font-size: 0.4rem;
            color: var(--gb-dark);
            white-space: nowrap;
        }

        #entrada {
            flex: 1;
            background: var(--gb-bg);
            border: 2px solid var(--gb-dark);
            color: var(--gb-dark);
            font-family: 'Press Start 2P', monospace;
            font-size: 1rem;
            text-align: center;
            padding: 8px;
            outline: none;
            text-transform: uppercase;
            box-shadow: 2px 2px 0 var(--gb-dark);
        }

        #entrada:disabled { opacity: 0.4; }

        button {
            background: var(--gb-dark);
            border: none;
            color: var(--white);
            font-family: 'Press Start 2P', monospace;
            font-size: 0.45rem;
            padding: 10px 14px;
            cursor: pointer;
            box-shadow: 3px 3px 0 var(--gb-mid);
            transition: transform 0.1s, box-shadow 0.1s;
            white-space: nowrap;
        }

        button:hover { transform: translate(-1px, -1px); box-shadow: 4px 4px 0 var(--gb-mid); }
        button:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0 var(--gb-mid); }
        button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

        @media (max-width: 480px) {
            #segredo { font-size: 1rem; letter-spacing: 8px; }
            .lb-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>

<body>
    <h1>★ JOGO DA FORCA ★</h1>

    <div class="screen">

        <div>
            <div class="vidas-label">VIDAS</div>
            <div id="vidas">
                <span class="coracao">❤️</span>
                <span class="coracao">❤️</span>
                <span class="coracao">❤️</span>
                <span class="coracao">❤️</span>
                <span class="coracao">❤️</span>
                <span class="coracao">❤️</span>
            </div>
        </div>

        <div>
            <div class="segredo-label">PALAVRA</div>
            <div id="segredo"></div>
        </div>

        <div>
            <div class="info-label">LETRAS USADAS</div>
            <div id="letras-usadas">—</div>
        </div>

        <div id="mensagem"></div>

        <div class="input-row">
            <span class="input-label">LETRA &gt;</span>
            <input type="text" id="entrada" maxlength="1" placeholder="?">
            <button onclick="chutar()">CHUTAR</button>
        </div>

        <div class="lb-grid">
            <div class="lb-box">
                <div class="lb-title">★ TOP HOJE</div>
                <div id="lb-dia"></div>
            </div>
            <div class="lb-box">
                <div class="lb-title">★ TOP GERAL</div>
                <div id="lb-geral"></div>
            </div>
        </div>

    </div>

    <script src="leaderboard.js"></script>
    <script src="forca.js"></script>
</body>

</html>
