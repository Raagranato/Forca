<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Guess</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --gb-bg: #9bbc0f;
            --gb-dark: #0f380f;
            --gb-mid: #306230;
            --gb-light: #8bac0f;
            --white: #f8f8e8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: var(--gb-bg);
            font-family: 'Press Start 2P', monospace;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(
                0deg, transparent, transparent 3px,
                rgba(0,0,0,0.03) 3px, rgba(0,0,0,0.03) 4px
            );
            pointer-events: none;
            z-index: 100;
        }

        .layout {
            width: 100vw;
            height: 100vh;
            display: grid;
            grid-template-rows: auto 1fr auto;
            grid-template-columns: 1fr 2fr 1fr;
            grid-template-areas:
                "header header header"
                "left   center  right"
                "footer footer footer";
            gap: 1.2vh;
            padding: 1.5vh 1.5vw;
        }

        header {
            grid-area: header;
            text-align: center;
            padding: 0.8vh 0;
            border-bottom: 3px solid var(--gb-dark);
        }
        header h1 {
            font-size: clamp(0.8rem, 2.5vw, 2rem);
            color: var(--gb-dark);
            letter-spacing: 4px;
        }

        .panel {
            background: var(--white);
            border: 3px solid var(--gb-dark);
            box-shadow: 4px 4px 0 var(--gb-dark);
            padding: 2vh 1.5vw;
            display: flex;
            flex-direction: column;
            gap: 1.5vh;
            overflow: hidden;
        }

        .panel-label {
            font-size: clamp(0.3rem, 0.9vw, 0.6rem);
            color: var(--gb-mid);
            border-bottom: 1px solid var(--gb-mid);
            padding-bottom: 0.8vh;
            flex-shrink: 0;
        }

        .left  { grid-area: left; }
        .right { grid-area: right; }
        .center { grid-area: center; justify-content: space-between; }

        /* Lives */
        #vidas { display: flex; flex-wrap: wrap; gap: 6%; }
        .coracao {
            font-size: clamp(1.2rem, 3.5vw, 3rem);
            line-height: 1;
            transition: filter 0.2s, transform 0.15s;
        }
        .coracao.perdido {
            filter: grayscale(1) opacity(0.2);
            transform: scale(0.7);
        }

        /* Used letters */
        #letras-usadas {
            font-size: clamp(0.3rem, 1vw, 0.7rem);
            color: var(--gb-mid);
            letter-spacing: 2px;
            word-break: break-all;
            line-height: 2;
            flex: 1;
        }

        /* Word */
        .segredo-wrap {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-top: 2px solid var(--gb-dark);
            border-bottom: 2px solid var(--gb-dark);
            padding: 1vh 0;
            overflow: hidden;
        }
        #segredo {
            color: var(--gb-dark);
            text-align: center;
            white-space: nowrap;
            letter-spacing: 0.15em;
        }

        /* Event message (win/lose) */
        #mensagem {
            font-size: clamp(0.4rem, 1.2vw, 0.9rem);
            color: var(--gb-dark);
            text-align: center;
            min-height: 1.4em;
            flex-shrink: 0;
            animation: blink 0.8s step-end infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50%       { opacity: 0; }
        }

        /* ── VOTING AREA ── */
        .voting-area {
            flex-shrink: 0;
            border: 2px solid var(--gb-dark);
            background: var(--gb-bg);
            padding: 1.2vh 1vw;
            display: flex;
            flex-direction: column;
            gap: 1vh;
        }

        .voting-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #chat-status-text {
            font-size: clamp(0.25rem, 0.85vw, 0.55rem);
            color: var(--gb-dark);
        }

        #countdown {
            font-size: clamp(0.3rem, 1vw, 0.65rem);
            color: var(--gb-dark);
        }

        /* Live vote bars */
        #vote-bars {
            display: flex;
            gap: 3%;
            align-items: flex-end;
            height: clamp(30px, 5vh, 60px);
            min-height: 30px;
        }

        .vote-bar-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
            height: 100%;
            justify-content: flex-end;
            gap: 2px;
        }

        .vote-bar-count {
            font-size: clamp(0.18rem, 0.6vw, 0.38rem);
            color: var(--gb-dark);
        }

        .vote-bar {
            width: 100%;
            background: var(--gb-dark);
            min-height: 3px;
            transition: height 0.3s ease;
        }

        .vote-bar-letter {
            font-size: clamp(0.22rem, 0.7vw, 0.45rem);
            color: var(--gb-dark);
        }

        .vote-bar-wrap.leader .vote-bar { background: var(--gb-mid); }
        .vote-bar-wrap.leader .vote-bar-letter { color: var(--gb-mid); }

        /* Result flash */
        #result-flash {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(15, 56, 15, 0.88);
            z-index: 200;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 3vh;
        }
        #result-flash.show { display: flex; }

        #result-letter {
            font-size: clamp(4rem, 18vw, 12rem);
            color: var(--gb-bg);
            line-height: 1;
            animation: popIn 0.3s ease;
        }

        #result-label {
            font-size: clamp(0.5rem, 2vw, 1.2rem);
            color: var(--gb-light);
            letter-spacing: 3px;
        }

        @keyframes popIn {
            0%   { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1);   opacity: 1; }
        }

        /* Leaderboard */
        .lb-section { flex-shrink: 0; }
        .lb-section-title {
            font-size: clamp(0.28rem, 0.85vw, 0.58rem);
            color: var(--gb-dark);
            margin-bottom: 0.8vh;
        }
        .lb-entry {
            font-size: clamp(0.24rem, 0.75vw, 0.52rem);
            color: var(--gb-mid);
            padding: 0.5vh 0;
            display: flex;
            justify-content: space-between;
            gap: 8%;
            border-bottom: 1px solid var(--gb-light);
        }
        .lb-entry .nome { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .lb-entry.primeiro { color: var(--gb-dark); }
        .lb-entry.vazio    { color: var(--gb-light); font-size: clamp(0.2rem, 0.65vw, 0.44rem); }

        footer {
            grid-area: footer;
            text-align: center;
            font-size: clamp(0.2rem, 0.6vw, 0.4rem);
            color: var(--gb-mid);
            padding: 0.5vh 0;
        }
    </style>
</head>
<body>

    <!-- Result flash overlay -->
    <div id="result-flash">
        <div id="result-letter"></div>
        <div id="result-label">CHAT VOTED!</div>
    </div>

    <div class="layout">

        <header>
            <h1>★ WORD GUESS ★</h1>
        </header>

        <!-- Left: lives + used letters -->
        <div class="panel left">
            <div class="panel-label">LIVES</div>
            <div id="vidas">
                <span class="coracao">❤️</span>
                <span class="coracao">❤️</span>
                <span class="coracao">❤️</span>
                <span class="coracao">❤️</span>
                <span class="coracao">❤️</span>
                <span class="coracao">❤️</span>
            </div>

            <div class="panel-label">USED LETTERS</div>
            <div id="letras-usadas">—</div>
        </div>

        <!-- Center -->
        <div class="panel center">
            <div class="panel-label">WORD</div>

            <div class="segredo-wrap">
                <div id="segredo"></div>
            </div>

            <div id="mensagem"></div>

            <!-- Voting area -->
            <div class="voting-area">
                <div class="voting-header">
                    <div id="chat-status-text">WAITING...</div>
                    <div id="countdown"></div>
                </div>
                <div id="vote-bars"></div>
            </div>
        </div>

        <!-- Right: leaderboard -->
        <div class="panel right">
            <div class="panel-label">LEADERBOARD</div>
            <div class="lb-section">
                <div class="lb-section-title">★ TODAY</div>
                <div id="lb-dia"></div>
            </div>
            <div class="lb-section">
                <div class="lb-section-title">★ ALL TIME</div>
                <div id="lb-geral"></div>
            </div>
        </div>

        <footer>WORD GUESS • CHAT EDITION</footer>
    </div>

    <script src="leaderboard.js"></script>
    <script src="forca.js"></script>

    <script>
        function ajustarFonteSegredo() {
            var wrap = document.querySelector('.segredo-wrap');
            var el = document.getElementById('segredo');
            if (!el.textContent.trim()) return;
            var maxW = wrap.clientWidth * 0.92;
            var maxH = wrap.clientHeight * 0.75;
            var size = 16;
            el.style.fontSize = size + 'px';
            while ((el.scrollWidth <= maxW && el.offsetHeight <= maxH) && size < 200) {
                size += 2;
                el.style.fontSize = size + 'px';
            }
            size -= 4;
            el.style.fontSize = size + 'px';
        }
        window.addEventListener('resize', ajustarFonteSegredo);
    </script>
</body>
</html>
